<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Login - Tiny Threads</title><link rel="stylesheet" href="styles.css"></head>
<body>
  <div class="container nav top-nav"><div class="logo">TINYTHREADS</div><div class="nav-group"><a href="/home">Home</a><a href="/shop">Shop</a><a href="/cart">Cart</a><a href="/checkout">Checkout</a><a href="/orders">Orders</a><a href="/about">About</a><a href="/contact">Contact</a><a href="/login">Login</a><a href="/admin">Admin</a></div></div>
  <main class="container">
    <section class="card">
      <h2>Login / Signup</h2>
      <div class="auth-grid">
        <form id="signupForm" class="stack"><h3>Signup</h3><input name="email" type="email" required><input name="password" type="password" minlength="6" required><button class="btn btn-order" type="submit">Signup</button></form>
        <form id="loginForm" class="stack"><h3>Login</h3><input name="email" type="email" required><input name="password" type="password" required><button class="btn btn-order" type="submit">Login</button></form>
      </div>
      <div id="authStatus" class="status-message"></div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app-common.js"></script><script src="login.js"></script>
</body>
</html>
