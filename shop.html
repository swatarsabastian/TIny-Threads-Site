<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Shop - Tiny Threads</title><link rel="stylesheet" href="styles.css"></head>
<body>
  <div class="container nav top-nav"><div class="logo">TINYTHREADS</div><div class="nav-group"><a href="/home">Home</a><a href="/shop">Shop</a><a href="/cart">Cart</a><a href="/checkout">Checkout</a><a href="/orders">Orders</a><a href="/about">About</a><a href="/contact">Contact</a><a href="/login">Login</a><a href="/admin">Admin</a></div></div>
  <main class="container">
    <section class="card">
      <h2>Shop</h2>
      <div class="filters">
        <input id="searchInput" placeholder="Search products">
        <select id="categoryFilter"><option value="all">All Categories</option><option>Kurti</option><option>Salwaar Suites</option></select>
        <select id="sizeFilter"><option value="all">All Sizes</option><option>S</option><option>M</option><option>L</option><option>XL</option></select>
        <select id="priceFilter"><option value="all">All Prices</option><option value="lt1000">Below 1000</option><option value="1000to2000">1000 to 2000</option><option value="gt2000">Above 2000</option></select>
        <select id="sortFilter"><option value="new">New Arrivals</option><option value="low_high">Price low to high</option></select>
      </div>
      <div id="shopGrid" class="product-grid"></div>
    </section>
  </main>
  <script src="app-common.js"></script><script src="shop.js"></script>
</body>
</html>
