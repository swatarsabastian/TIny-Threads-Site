<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Checkout - Tiny Threads</title><link rel="stylesheet" href="styles.css"></head>
<body>
  <div class="container nav top-nav"><div class="logo">TINYTHREADS</div><div class="nav-group"><a href="/home">Home</a><a href="/shop">Shop</a><a href="/cart">Cart</a><a href="/checkout">Checkout</a><a href="/orders">Orders</a><a href="/about">About</a><a href="/contact">Contact</a><a href="/login">Login</a><a href="/admin">Admin</a></div></div>
  <main class="container">
    <section class="card">
      <h2>Checkout</h2>
      <div id="orderSummary" class="stack"></div>
      <form id="checkoutForm" class="stack">
        <input name="name" placeholder="Customer Name" required>
        <input name="phone" placeholder="Phone" required>
        <textarea name="address" placeholder="Address" required></textarea>
        <select name="paymentProvider" required>
          <option value="cod">Cash on Delivery</option>
          <option value="whatsapp">WhatsApp Confirmation</option>
        </select>
        <button class="btn btn-order" type="submit">Place Order</button>
      </form>
      <div id="checkoutStatus" class="status-message"></div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app-common.js"></script><script src="checkout.js"></script>
</body>
</html>
